name: Publish NuGet

on:
  schedule:
    - cron: '0 8 * * 1'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      update_upstream:
        description: Check latest upstream prek and publish if updated
        required: true
        default: false
        type: boolean
      publish:
        description: Publish package to nuget.org
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    name: Pack and publish
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: Update pinned prek release
        id: update
        if: github.event_name == 'schedule' || inputs.update_upstream == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/update-prek-version.sh

      - name: Commit upstream update
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Prek.DotNetTool/PrekTool.cs Prek.DotNetTool/Prek.DotNetTool.csproj Prek.DotNetTool/Assets.cs example/.config/dotnet-tools.json
          git commit -m "chore: update prek to ${{ steps.update.outputs.upstream_version }}"
          git push

      - name: Setup .NET
        if: github.event_name != 'schedule' || steps.update.outputs.changed == 'true'
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        if: github.event_name != 'schedule' || steps.update.outputs.changed == 'true'
        run: dotnet restore PrekDotNetTool.slnx

      - name: Build
        if: github.event_name != 'schedule' || steps.update.outputs.changed == 'true'
        run: dotnet build PrekDotNetTool.slnx -c Release --no-restore

      - name: Pack
        if: github.event_name != 'schedule' || steps.update.outputs.changed == 'true'
        run: dotnet pack Prek.DotNetTool -c Release --no-build --nologo

      - name: Smoke test package
        if: github.event_name != 'schedule' || steps.update.outputs.changed == 'true'
        run: ./example/smoke-test.sh

      - name: Upload package artifact
        if: github.event_name != 'schedule' || steps.update.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/package/*.nupkg
          if-no-files-found: error

      - name: NuGet login
        if: github.event_name == 'release' || inputs.publish == true || steps.update.outputs.changed == 'true'
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to nuget.org
        if: github.event_name == 'release' || inputs.publish == true || steps.update.outputs.changed == 'true'
        run: >-
          dotnet nuget push "artifacts/package/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source "https://api.nuget.org/v3/index.json"
          --skip-duplicate
