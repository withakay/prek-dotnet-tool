name: Publish NuGet

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish:
        description: Publish package to nuget.org
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    name: Pack and publish
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore PrekDotNetTool.slnx

      - name: Build
        run: dotnet build PrekDotNetTool.slnx -c Release --no-restore

      - name: Pack
        run: dotnet pack Prek.DotNetTool -c Release --no-build --nologo

      - name: Smoke test package
        run: ./example/smoke-test.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/package/*.nupkg
          if-no-files-found: error

      - name: NuGet login
        if: github.event_name == 'release' || inputs.publish == true
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to nuget.org
        if: github.event_name == 'release' || inputs.publish == true
        run: >-
          dotnet nuget push "artifacts/package/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source "https://api.nuget.org/v3/index.json"
          --skip-duplicate
